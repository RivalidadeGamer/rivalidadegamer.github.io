<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneios - Rivalidade Gamer</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(90deg, var(--secondary), var(--bg-dark));
            padding: 60px 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
        }

        .hero-title {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--primary);
            margin: 0;
        }

        nav {
            background: #111;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary); }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        .card-vazio {
            background: var(--card-bg);
            border: 2px dashed #444;
            padding: 50px 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .icon-aviso {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            background: var(--secondary);
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-voltar:hover { background: #5a00cc; }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<nav>
    <a href="../index.html">HOME</a>
    <a href="index.html">TORNEIOS</a>
    <a target="_blank" href="https://rivalidadegamer.blogspot.com">BLOG</a>
</nav>

<header>
    <h1 class="hero-title">Torneios</h1>
    <p>Área de Competições</p>
</header>

<div class="container">
    <div class="card-vazio">
        <span class="icon-aviso">⏳</span>
        <h2>Nenhum torneio ativo no momento</h2>
        <p>Estamos a preparar as próximas arenas! Fica atento ao nosso blog para saberes as datas das próximas inscrições.</p>
        <a href="../index.html" class="btn-voltar">Voltar à Home</a>
    </div>
</div>

<footer>
    &copy; 2026 Rivalidade Gamer - Todos os direitos reservados.
</footer>

</body>
</html>
