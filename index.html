<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Caçador de Capivaras - Lixo Games</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #e0f7fa;
      overflow: hidden;
    }

    #intro {
      background-color: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      position: relative;
    }

    #lixo-box {
      width: 100px;
      height: 100px;
      background-color: #666;
      border: 3px solid #444;
      border-radius: 10px;
      position: absolute;
      left: 20px;
      top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    #game-area {
      position: relative;
      width: 100%;
      height: calc(100vh - 100px);
      background-image: url('https://i.imgur.com/3ZQ3Z3U.png'); /* fundo opcional */
      background-size: cover;
    }

    .capivara {
      width: 80px;
      height: 50px;
      background-color: brown;
      border-radius: 25px;
      position: absolute;
      bottom: 0;
      animation: moveCapivara 5s linear infinite;
    }

    @keyframes moveCapivara {
      0% { left: -100px; }
      100% { left: 100vw; }
    }

    #player {
      width: 60px;
      height: 60px;
      background-color: #ffcc00;
      border-radius: 50%;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    #corda {
      width: 4px;
      height: 100px;
      background-color: #000;
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }
  </style>
</head>
<body>
  <div id="intro">
    <div id="lixo-box">Lixo Games</div>
    Bem-vindo ao Caçador de Capivaras!
  </div>

  <div id="game-area">
    <div id="player"></div>
    <div id="corda"></div>
    <div class="capivara" style="top: 100px;"></div>
    <div class="capivara" style="top: 200px;"></div>
  </div>

  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === ' ') {
        const corda = document.getElementById('corda');
        corda.style.display = 'block';
        setTimeout(() => {
          corda.style.display = 'none';
        }, 500);
      }
    });
  </script>
</body>
</html>
